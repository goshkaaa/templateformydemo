<!doctype html><html lang="ru" data-theme="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>DemoSite | Регистрация</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/responsive.css"></head><body>
<main class="auth-layout"><section class="auth-card card"><a class="logo" href="index.html"><span class="logo__mark">D</span><span>DemoSite</span></a><h1>Регистрация</h1><p class="auth-mode" data-auth-mode>Проверяем режим авторизации...</p><form class="list" data-register-form><label class="field"><span>Имя</span><input class="input" name="name" data-required><small class="form-error"></small></label><label class="field"><span>Фамилия</span><input class="input" name="surname" data-required><small class="form-error"></small></label><label class="field"><span>Телефон</span><input class="input" name="phone" data-required><small class="form-error"></small></label><label class="field"><span>Email</span><input class="input" type="email" name="email" data-required><small class="form-error"></small></label><label class="field"><span>Пароль</span><input class="input" type="password" name="password" data-required><small class="form-error"></small></label><button class="btn" type="submit">Зарегистрироваться</button><a class="btn btn--ghost" href="login.html">Уже есть аккаунт</a></form></section></main>
<script src="js/storage.js"></script><script src="js/api.js"></script><script src="js/validation.js"></script><script src="js/language.js"></script><script src="js/main.js"></script><script src="js/auth.js"></script></body></html>
