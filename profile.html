<!doctype html><html lang="ru" data-theme="light"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>DemoSite | Кабинет</title><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/responsive.css"></head><body data-page="profile">

<main class="section"><div class="container"><div class="section__head"><span class="badge">Profile</span><h1>Личный кабинет</h1><p class="muted">Пользователь: <span data-user-name></span></p></div><div class="profile-layout"><aside class="tabs card"><button class="btn btn--accent tab-btn" data-tab="#profileTab" type="button">Профиль</button><button class="btn btn--ghost tab-btn" data-tab="#requestsTab" type="button">Заявки</button><button class="btn btn--ghost tab-btn" data-tab="#ordersTab" type="button">Заказы</button><button class="btn btn--ghost tab-btn" data-tab="#favoritesTab" type="button">Избранное</button><button class="btn btn--ghost tab-btn" data-tab="#settingsTab" type="button">Настройки</button></aside><section class="card"><div class="tab-panel is-active" id="profileTab"><h2>Данные профиля</h2><form class="form-grid" data-profile-form><label class="field"><span>Имя</span><input class="input" name="profileName"></label><label class="field"><span>Фамилия</span><input class="input" name="profileSurname"></label><label class="field"><span>Телефон</span><input class="input" name="profilePhone"></label><label class="field"><span>Email</span><input class="input" name="profileEmail" type="email"></label><button class="btn wide" type="submit">Сохранить</button></form></div><div class="tab-panel" id="requestsTab"><h2>История заявок</h2><div class="list" id="requestsList"></div></div><div class="tab-panel" id="ordersTab"><h2>История заказов</h2><div class="list" id="ordersList"></div></div><div class="tab-panel" id="favoritesTab"><h2>Избранное</h2><div class="list" id="favoritesList"></div></div><div class="tab-panel" id="settingsTab"><h2>Смена пароля</h2><form class="list" data-password-form><label class="field"><span>Новый пароль</span><input class="input" type="password" name="newPassword" data-required><small class="form-error"></small></label><label class="field"><span>Повтор пароля</span><input class="input" type="password" name="repeatPassword" data-required><small class="form-error"></small></label><button class="btn" type="submit">Изменить пароль</button></form></div></section></div></div></main>
